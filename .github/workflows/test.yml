name: Test

on: [push, pull_request]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.6", "3.7", "3.8"]
        os: [ubuntu-latest, macos-latest, windows-latest]
        toxenv: [py, style, docs]
        exclude:
          - { python-version: 3.6, toxenv: style, os: ubuntu-latest }
          - { python-version: 3.7, toxenv: style, os: ubuntu-latest }
#          - { python-version: 3.8, toxenv: style, os: ubuntu-latest } not excluded
          - { python-version: 3.6, toxenv: style, os: macos-latest }
          - { python-version: 3.7, toxenv: style, os: macos-latest }
          - { python-version: 3.8, toxenv: style, os: macos-latest }
          - { python-version: 3.6, toxenv: style, os: windows-latest }
          - { python-version: 3.7, toxenv: style, os: windows-latest }
          - { python-version: 3.8, toxenv: style, os: windows-latest }

          - { python-version: 3.6, toxenv: docs, os: ubuntu-latest }
          - { python-version: 3.7, toxenv: docs, os: ubuntu-latest }
#          - { python-version: 3.8, toxenv: docs, os: ubuntu-latest } not excluded
          - { python-version: 3.6, toxenv: docs, os: macos-latest }
          - { python-version: 3.7, toxenv: docs, os: macos-latest }
          - { python-version: 3.8, toxenv: docs, os: macos-latest }
          - { python-version: 3.6, toxenv: docs, os: windows-latest }
          - { python-version: 3.7, toxenv: docs, os: windows-latest }
          - { python-version: 3.8, toxenv: docs, os: windows-latest }

#          - { python-version: 3.6, toxenv: py, os: ubuntu-latest } not excluded
#          - { python-version: 3.7, toxenv: py, os: ubuntu-latest } not excluded
#          - { python-version: 3.8, toxenv: py, os: ubuntu-latest } not excluded
          - { python-version: 3.6, toxenv: py, os: macos-latest }
#          - { python-version: 3.7, toxenv: py, os: macos-latest } not excluded
          - { python-version: 3.8, toxenv: py, os: macos-latest }
          - { python-version: 3.6, toxenv: py, os: windows-latest }
          - { python-version: 3.7, toxenv: py, os: windows-latest }
#          - { python-version: 3.8, toxenv: py, os: windows-latest } not excluded

#  3.8 Linux py
#  3.7 Linux py
#  3.6 Linux py
#  3.8 Linux style
#  3.8 Linux docs
#  3.8 Windows py
#  3.7 Mac py

    steps:
      - uses: actions/checkout@v2

      - name: Install Python 3.9
        if: matrix.python-version == '3.9'
        run: |
          sudo add-apt-repository ppa:deadsnakes/ppa
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends python3.9-dev python3.9-distutils python3.9-venv
          python3.9 -m pip install --upgrade pip setuptools
          python3.9 -m venv $HOME/venv-python3.9
          echo "::set-env name=VIRTUAL_ENV::$HOME/venv-python3.9"
          echo "::add-path::$HOME/venv-python3.9/bin"

      - name: Set up Python ${{ matrix.python-version }}
        if: matrix.python-version != '3.9'
        uses: actions/setup-python@v1
        with:
          python-version: ${{ matrix.python-version }}

      - name: Get pip cache dir
        id: pip-cache
        run: |
          python -m pip install -U "pip>=20.1"
          echo "::set-output name=dir::$(pip cache dir)"

      - name: pip cache
        uses: actions/cache@v1
        with:
          path: ${{ steps.pip-cache.outputs.dir }}
          key:
            ${{ matrix.os }}-${{ matrix.python-version }}-v2-${{
            hashFiles('**/setup.py') }}
          restore-keys: |
            ${{ matrix.os }}-${{ matrix.python-version }}-v2-

      - name: Install dependencies
        run: |
          python -m pip install -U wheel
          python -m pip install -U tox

      - name: Tox tests
        shell: bash
        run: |
          tox -e py

      - name: Upload coverage
        if: success()
        run: |
          curl --retry 8 -s https://codecov.io/bash -o codecov.sh
          bash codecov.sh -F ${{ matrix.codecov-flag }}
        env:
          CODECOV_NAME: ${{ matrix.os }} Python ${{ matrix.python-version }}
